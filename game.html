<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <title>作答中</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="./game.css" />
</head>

<body>
  <div class="game-container">
    <div class="top-bar">
      <div id="progress">1 / 10</div>
      <button id="musicToggle" class="music-toggle" type="button">🔊 音乐开</button>
    </div>

    <h3 id="question">题目加载中...</h3>

    <img id="questionImage" class="question-img" style="display:none;" alt="题目图片">

    <div id="options">
      <button class="option" id="optA" onclick="selectAnswer('A')">
        <strong>A.</strong> <span id="A"></span>
      </button>

      <button class="option" id="optB" onclick="selectAnswer('B')">
        <strong>B.</strong> <span id="B"></span>
      </button>

      <button class="option" id="optC" onclick="selectAnswer('C')">
        <strong>C.</strong> <span id="C"></span>
      </button>

      <button class="option" id="optD" onclick="selectAnswer('D')">
        <strong>D.</strong> <span id="D"></span>
      </button>
    </div>

    <button id="nextBtn" onclick="nextQuestion()">下一题</button>
  </div>

  <script src="./game.js"></script>
</body>
</html>
