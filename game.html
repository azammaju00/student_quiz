<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <title>作答中</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="./game.css" />
</head>

<body>
  <div class="game-container">
    <div class="top-bar">
      <div id="progress">1 / 10</div>

      <div class="audio-control">
        <button id="musicToggle" class="music-btn" type="button">🔊</button>
        <input id="volumeSlider" type="range" min="0" max="100" value="35">
      </div>
    </div>
    <img id="questionImage" class="question-img" style="display:none;" alt="题目图片">
    <h3 id="question">题目加载中...</h3>

    

    <div id="options">
      <button class="option" id="optA" onclick="selectAnswer('A')">
        <strong>A.</strong> <span id="A"></span>
      </button>

      <button class="option" id="optB" onclick="selectAnswer('B')">
        <strong>B.</strong> <span id="B"></span>
      </button>

      <button class="option" id="optC" onclick="selectAnswer('C')">
        <strong>C.</strong> <span id="C"></span>
      </button>

      <button class="option" id="optD" onclick="selectAnswer('D')">
        <strong>D.</strong> <span id="D"></span>
      </button>
    </div>

    <button id="nextBtn" onclick="nextQuestion()">下一题</button>

    <div id="resultBox" class="result-box" style="display:none;">
      <div id="starsContainer" class="stars-container"></div>

      <div id="finalText" class="final-text"></div>

      <div class="action-buttons">
        <button id="retryBtn" type="button">再来一次</button>
        <button id="homeBtn" type="button">返回主页Homepage</button>
      </div>
    </div>
  </div>

  <footer class="credit">
  © 2026 Azam Maju Tuition Center · All Rights Reserved<br>
  仅供学习使用 · For Learning Use Only
</footer>

  <script src="./game.js"></script>
</body>
</html>
